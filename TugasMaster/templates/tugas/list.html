<!DOCTYPE html>
<html>
<head>
    <title>Data Tugas</title>
</head>
<body>

<h1>Data Tugas</h1>

<p><a href="/tugas/tambah/">+ Tambah Tugas</a></p>

<table border="1" cellpadding="6">

    <thead>
        <tr>
            <th>No</th>
            <th>Judul Tugas</th>
            <th>Mata Kuliah</th>
            <th>Deadline</th>
            <th>Status</th>
            <th>Aksi</th>
        </tr>
    </thead>

    <tbody>

    {% for t in tugas %}

    <tr>
        <td>{{ forloop.counter }}</td>
        <td>{{ t.judul }}</td>
        <td>{{ t.mata_kuliah }}</td>
        <td>{{ t.deadline }}</td>
        <td>{{ t.status }}</td>
        <td>
            <a href="/tugas/{{ t.id }}/">Detail</a>
            <a href="/tugas/{{ t.id }}/edit/">Edit</a>
            <a href="/tugas/{{ t.id }}/hapus/">Hapus</a>
        </td>
    </tr>

    {% empty %}

    <tr>
        <td colspan="6">Belum ada data tugas</td>
    </tr>

    {% endfor %}

    </tbody>

</table>

</body>
</html>
